<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="./assets/img/4geeks.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello Rigo with Vanilla.js</title>
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.2.0/css/all.css" />
</head>

<body class="bg-success">

  <div class="container-fluid d-flex flex-column justify-content-center align-items-center vh-100">

    <div class="row mb-4 g-2 justify-content-center">
      <div class="col-auto">
        <input type="number" id="widthInput" class="form-control" placeholder="Ancho (px)">
      </div>
      <div class="col-auto">
        <input type="number" id="heightInput" class="form-control" placeholder="Alto (px)">
      </div>
      <div class="col-auto">
        <button id="drawBtn" class="btn btn-light shadow-sm">Nueva Carta</button>
      </div>
    </div>

    <div id="card" class="card shadow-lg border-0">
      <div class="top-suit p-3 text-start"></div>
      <div class="card-body d-flex justify-content-center align-items-center value"></div>
      <div class="bottom-suit p-3 text-end"></div>
    </div>

  </div>

  <script type="module" src="/app.js"></script>
</body>

</html>>
